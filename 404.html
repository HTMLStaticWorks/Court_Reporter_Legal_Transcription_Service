<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Court Reporter & Legal Transcription</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/rtl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, rgba(30,94,255,0.1), transparent 50%);
            text-align: center;
        }
    </style>
</head>
<body dir="ltr">
    <script>
        (function() {
            const savedDir = localStorage.getItem('site-dir') || 'ltr';
            document.body.setAttribute('dir', savedDir);
            const savedTheme = localStorage.getItem('site-theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        })();
    </script>

    <div class="container" style="max-width: 600px;">
        <i class="fa-solid fa-file-circle-xmark" style="font-size: 80px; color: var(--accent-primary); margin-bottom: 24px;"></i>
        <h1 style="font-size: 80px; line-height: 1; margin-bottom: 10px; color: var(--accent-primary);">404</h1>
        <h2 style="margin-bottom: 20px;">Record Not Found</h2>
        <p style="margin-bottom: 40px; color: var(--text-secondary);">The document or page you are looking for has been moved, deleted, or does not exist in our registry.</p>
        
        <div style="display: flex; justify-content: center; gap: 16px;">
            <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house" style="margin-right: 8px;"></i> Return Home</a>
            <a href="contact.html" class="btn btn-secondary"><i class="fa-solid fa-headset" style="margin-right: 8px;"></i> Contact Support</a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
