<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Court Reporter & Legal Transcription</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/rtl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, rgba(0,168,150,0.1), transparent 50%);
            text-align: center;
        }
    </style>
</head>
<body dir="ltr">
    <script>
        (function() {
            const savedDir = localStorage.getItem('site-dir') || 'ltr';
            document.body.setAttribute('dir', savedDir);
            const savedTheme = localStorage.getItem('site-theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        })();
    </script>

    <div class="container" style="max-width: 600px;">
        <i class="fa-solid fa-hourglass-half pulse-element" style="font-size: 60px; color: var(--accent-secondary); margin-bottom: 30px; display: inline-block; padding: 20px; border-radius: 50%; background: rgba(0,168,150,0.1);"></i>
        <h1 style="margin-bottom: 20px;">Portal Upgrade In Progress</h1>
        <p style="margin-bottom: 40px; color: var(--text-secondary);">We are currently deploying advanced litigation support tools to this section of our enterprise portal. Please check back shortly.</p>
        
        <form style="display: flex; max-width: 400px; margin: 0 auto 40px;">
            <input type="email" class="form-control" placeholder="Enter email for updates..." style="border-radius: 4px 0 0 4px; border-right: none;">
            <button type="button" class="btn btn-primary" style="border-radius: 0 4px 4px 0;">Notify Me</button>
        </form>

        <div>
            <a href="index.html" class="btn btn-secondary"><i class="fa-solid fa-house" style="margin-right: 8px;"></i> Return to Main Site</a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
