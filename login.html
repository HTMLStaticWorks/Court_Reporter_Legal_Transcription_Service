<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal Login | Court Reporter & Legal Transcription</title>
    <link rel="icon" type="image/x-icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-weight='bold' fill='%231E5EFF'>⚖</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/rtl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            background-image: radial-gradient(circle at top right, rgba(30, 94, 255, 0.1), transparent 40%),
                radial-gradient(circle at bottom left, rgba(0, 168, 150, 0.1), transparent 40%);
            padding: 40px 0;
            box-sizing: border-box;
            position: relative;
        }

        .auth-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .auth-card {
            background: rgba(26, 35, 48, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        body:not(.dark-mode) .auth-card {
            background: transparent;
            box-shadow: none;
        }
    </style>
</head>

<body dir="ltr">

    <!-- RTL and Dark Mode toggles positioned absolutely in top right -->
    <div class="nav-actions"
        style="position: absolute; top: 20px; right: 20px; display: flex; gap: 12px; align-items: center; z-index: 10;">
        <a href="#" id="dark-mode-toggle" title="Toggle Light/Dark"><i class="fa-solid fa-moon"></i></a>
        <a href="#" id="rtl-toggle" title="Toggle RTL"><i class="fa-solid fa-right-left"></i></a>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <a href="index.html" class="nav-brand"
                    style="justify-content: center; font-size: 20px; margin-bottom: 20px; display: flex; text-decoration: none; align-items: center;">
                    <i class="fa-solid fa-scale-balanced" style="color: var(--accent-primary); margin-right: 8px;"></i>
                    <span style="color: var(--text-primary); font-weight: 600;">LexisTranscripts</span>
                </a>

            </div>

            <form>
                <div class="form-group">
                    <label class="form-label">Firm Email Address</label>
                    <input type="email" class="form-control" placeholder="name@lawfirm.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-toggle-container">
                        <input type="password" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility"
                            tabindex="-1">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px; margin-bottom: 24px;">
                    <label
                        style="display: inline-flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary); font-size: 14px;">
                        <input type="checkbox" id="remember-me"
                            style="cursor: pointer; accent-color: var(--accent-primary);">
                        <span>Remember Me</span>
                    </label>
                    <a href="#" class="auth-link" style="font-size: 14px; color: var(--accent-primary);">Forgot
                        Password?</a>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 10px; margin-bottom: 20px;">Secure Login</button>



                <div style="margin-top: 30px; text-align: center;">
                    <div style="display: flex; align-items: center; margin-bottom: 24px;">
                        <div style="flex-grow: 1; height: 1px; background: var(--border-color);"></div>
                        <span style="padding: 0 16px; font-size: 14px; color: var(--text-secondary);">Or continue
                            with</span>
                        <div style="flex-grow: 1; height: 1px; background: var(--border-color);"></div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        <button type="button" class="btn social-login-btn"
                            style="width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 10px;">
                            <i class="fa-brands fa-google"></i>
                            <span>Google</span>
                        </button>
                        <button type="button" class="btn social-login-btn"
                            style="width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 10px;">
                            <i class="fa-brands fa-facebook-f"></i>
                            <span>Facebook</span>
                        </button>
                        <button type="button" class="btn social-login-btn"
                            style="width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 10px;">
                            <i class="fa-brands fa-apple"></i>
                            <span>Apple</span>
                        </button>
                    </div>
                </div>
                <div style="text-align: center; margin-top: 20px; font-size: 14px;">
                    <span style="color: var(--text-secondary);">Don't have a firm account?</span>
                    <a href="register.html" class="auth-link"
                        style="color: var(--accent-primary); font-weight: 500;">Register Firm</a>
                </div>
            </form>
        </div>


    </div>

    <script src="js/main.js"></script>
</body>

</html>
